name: Generate QR Code
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate QR Code
        run: |
          # Replace with your actual URL
          curl -o qrcode.png "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://yourusername.github.io/"

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add qrcode.png
          git commit -m "Update QR Code" || exit 0
          git push
